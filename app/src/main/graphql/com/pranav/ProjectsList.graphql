query GetMyProjects {
    currentUser {
        id
        projectMemberships(first: 20) {
            __typename
            nodes {
                __typename
                id
                project {
                    __typename
                    languages {
                        color
                        name
                    }
                    id
                    name
                    fullPath
                    description
                    visibility
                    starCount
                    lastActivityAt
                }
            }
            pageInfo {
                __typename
                hasNextPage
                endCursor
            }
        }
    }
}