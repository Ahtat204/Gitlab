query GetRepoTree($projectPath: ID!) {

    project(fullPath: $projectPath) {
        __typename
        id
        name
        topics
        description
        lastActivityAt
        repository {
            __typename
            lastCommit{
                id
                name
            }
            tree(path: "") {
                __typename
                lastCommit {
                    __typename
                    id
                    title
                }
                trees{
                    __typename
                    nodes {
                        __typename
                        name
                    }
                    edges {
                        __typename
                        node {
                            __typename
                            name
                        }
                    }
                }
                blobs{
                    __typename
                    nodes {
                        __typename
                        name
                        type     # Returns "tree" for folders, "blob" for files
                        path
                        flatPath

                    }}
            }
        }
    }
}