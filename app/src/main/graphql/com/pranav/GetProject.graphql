query GetRepoTree($projectPath: ID!, $path: String!) {
    project(fullPath: $projectPath) {
        id
        name
        topics
        description
        repository {
            tree(path: $path) {
                lastCommit {
                    id
                    title
                }
                trees{
                    nodes {
                        name
                    }
                    edges {
                        node {
                            name
                        }
                    }
                }
                blobs{ nodes {
                    name
                    type     # Returns "tree" for folders, "blob" for files
                    path
                    flatPath

                }}
            }
        }
    }
}