query GetProjectDetails($projectPath: ID!) {
    project(fullPath: $projectPath) {

        __typename
        statistics {
            commitCount

        }
        namespace {
            name
            fullPath
        }
        statistics {
            commitCount
        }

        projectMembers{
            nodes {
                user {
                    name
                }
            }
        }

        id
        name
        topics
        description
        lastActivityAt
        issues{
            count
        }
        mergeRequests{
            count
        }
        pipelines{
            count
        }
        topics
        languages {
            color
            name
            share
        }
        repository {

            branchNames(searchPattern: "*", offset: 0, limit: 100)
            __typename
            rootRef
            lastCommit{
                id
                name
            }
            tree(path: "") {
                __typename

                lastCommit {
                    __typename
                    id
                    title
                }
                trees{
                    __typename
                    nodes {
                        __typename
                        name
                    }
                    edges {
                        __typename
                        node {
                            __typename
                            name
                        }
                    }
                }
                blobs{
                    __typename
                    nodes {
                        __typename
                        name
                        type     # Returns "tree" for folders, "blob" for files
                        path
                        flatPath

                    }}
            }
        }
    }
}