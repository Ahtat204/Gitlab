query GetProjectDetails($projectPath: ID!) {
    project(fullPath: $projectPath) {
        __typename
        pipelineCounts{
            pending
            running
        }
        openIssuesCount
        statistics {
            commitCount

        }

        openMergeRequestsCount
        namespace {
            path
        }
        forksCount
        starCount
        id
        name
        description
    }
}