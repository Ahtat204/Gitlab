query GetProjectDetails($projectPath: ID!) {
    project(fullPath: $projectPath) {
        __typename
        statistics {
            commitCount


        }

        namespace {
            path
        }
        forksCount
        starCount
        id
        name
        description
        issues{
            count
        }
        mergeRequests{
            count
        }
        pipelines{
            count
        }
        topics
        languages {
            name
            share
        }
        repository {

            __typename
            branchNames(searchPattern: "*", offset: 0, limit: 100)
            rootRef
            lastCommit{
                id
                name
            }
        }
    }
}