query GetProjectDetails($projectPath: ID!) {
    project(fullPath: $projectPath) {
        __typename
        pipelineCounts{
            pending
            running
        }
        openIssuesCount
        statistics {
            commitCount

        }
        fullPath
        openMergeRequestsCount
        namespace {
            path
        }
        forksCount
        starCount
        id
        name
        description
