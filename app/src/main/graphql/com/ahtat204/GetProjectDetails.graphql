query GetProjectDetails($projectPath: ID!) {
    project(fullPath: $projectPath) {
        __typename
        namespace {
            name
            fullName
        }
        statistics {
            commitCount

        }
        namespace {
            name
            fullPath
        }
        projectMembers{
            nodes {
                user {
                    name
                }
            }
        }
        forksCount
        starCount
        id
        name
        topics
        description
        lastActivityAt
        issues{
            count
        }
        mergeRequests{
            count
        }
        pipelines{
            count
        }
        topics
        languages {
            color
            name
            share
        }
        repository {

            __typename
            branchNames(searchPattern: "*", offset: 0, limit: 100)
            rootRef
            lastCommit{
                id
                name
            }
        }
    }
}