query GetMyProjects($cursor: String){
    currentUser {
        avatarUrl
        projectMemberships(first: 10,after: $cursor) {
            __typename
            nodes {
                __typename
                id
                project {

                    topics
                    lastActivityAt
                    __typename
                    languages {
                        color
                        name
                    }
                    name
                    fullPath
                    description
                    visibility
                    pipelines(first: 1){
                        nodes {
                            __typename
                            id
                            status
                        }
                    }
                }
            }
            pageInfo {
                __typename
                hasNextPage
                endCursor
            }
        }
    }
}