query GetRepositoryCommits($projectPath: ID!,$cursor:String,$branch:String!){ ## we can use one query with a nullable (apollo almost always uses nullable types like String?)$cursor variable and just pass null for the first page
    project(fullPath: $projectPath){
        __typename
        repository {
            __typename
            branchNames(searchPattern: "*", offset: 0, limit: 100)
            commits(ref:$branch,first: 20,after: $cursor) {
                __typename
                nodes {
                    __typename
                    id
                    sha
                    name
                    authorName
                    committedDate
                    signature {
                        __typename
                        verificationStatus
                    }

                }
                pageInfo {
                    __typename
                    endCursor
                    hasNextPage
                    startCursor
                }
            }
            __typename

        }

    }

}