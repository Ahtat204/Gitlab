# Query: GetRepositoryTree
#
# Purpose
# - Retrieves the content of a specific subtree (folder) within a GitLab project repository.
# - Designed to avoid catastrophic performance issues on large repositories by scoping
#   to a given path instead of using `recursive = true`.
#
# Parameters
# - $projectPath (ID!): The full path of the project (e.g., "group/project").
# - $treePath (String!): The path of the folder within the repository to fetch.
# - $branch (String): Optional branch reference. Defaults to the repository’s root ref if omitted.
#
# Behavior
# - Fetches the repository tree at the given path and branch.
# - Returns metadata about the last commit affecting this subtree:
#   - Commit message
#   - Commit date
#   - Author name
# - Returns both folder nodes (`trees`) and file nodes (`blobs`) with pagination info.
# - Each node includes:
#   - id
#   - name
#   - path
# - Pagination fields (`pageInfo`, `edges`) allow incremental loading of large directories.
#
# Example Usage
# query GetRepositoryTree($projectPath: ID!, $treePath: String!, $branch: String) {
#   project(fullPath: $projectPath) {
#     repository {
#       tree(ref: $branch, path: $treePath) {
#         lastCommit(ref: $branch) {
#           message
#           committedDate
#           author { name }
#         }
#         trees {
#           nodes { id name path }
#           pageInfo { startCursor }
#           edges { cursor }
#         }
#         blobs {
#           nodes { id name path }
#           pageInfo { startCursor }
#           edges { cursor }
#         }
#       }
#     }
#   }
# }
#
# Notes
# - Use pagination (`pageInfo` and `edges`) to load large directories incrementally.
# - Avoid recursive queries on `Repository.tree` for performance reasons.
# - Combine with UI components like FileExplorer and TreeItemCard to render results.

query GetRepositoryTree($projectPath:ID!,$treePath: String!,$branch:String){
    project(fullPath: $projectPath){
        repository{
            tree(ref: $branch,path: $treePath){
                lastCommit(ref: $branch){
                    message
                    committedDate
                    author {
                        name
                    }
                }
                trees(first: 10){
                    __typename

                    nodes {
                        id
                        name
                        path

                    }
                    pageInfo {
                        startCursor
                    }
                    edges {
                        cursor
                    }
                }
                blobs(first: 10 ){
                    nodes {
                        id
                        name
                        path
                    }
                    pageInfo {
                        startCursor
                    }
                    edges {
                        cursor
                        node {
                            id
                            path
                            name
                        }
                    }
                }
            }
        }
    }
}