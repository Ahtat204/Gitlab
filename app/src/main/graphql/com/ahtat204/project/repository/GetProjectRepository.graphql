query GetProjectRepository($projectPath:ID!,$branch:String){
    project(fullPath: $projectPath){
        id
        repository {
            rootRef
            ## branchNames(searchPattern: "*",limit: 20,offset: $skip)
#            blobs(ref: $branch,paths: ""){ to fetch raw content of the blob(file)
#                nodes {
#                    rawTextBlob
#                    rawBlob
#                }
#                pageInfo {
#                    startCursor
#                }
#            }
            lastCommit(ref: $branch){
                message
                committedDate
                author {
                    name
                }
            }
            tree(ref: $branch){
                lastCommit(ref: $branch){
                    message
                    committedDate
                    author {
                        name
                    }
                }
                trees{
                    __typename

                    nodes {
                        id
                        name
                        path

                    }
                    pageInfo {
                        startCursor
                    }
                    edges {
                        cursor
                    }
                }
                blobs{
                    nodes {
                        id
                        name
                        path
                    }
                    pageInfo {
                        startCursor
                    }
                    edges {
                        cursor
                    }
                }
            }
        }
    }
}