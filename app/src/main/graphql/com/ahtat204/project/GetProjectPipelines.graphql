query GetProjectPipelines($project:ID!,$cursor:String,$status:PipelineStatusEnum){
    project(fullPath: $project){

        pipelines(first: 20,status: $status,after: $cursor){
            nodes {
                status
                jobs{
                    nodes {
                        id
                        name
                        duration
                        startedAt
                        status

                    }
                }
                committedAt
                createdAt
                startedAt
                duration
                id
                name

            }
            pageInfo {
                hasNextPage
                startCursor
                hasPreviousPage
            }
        }
    }
}