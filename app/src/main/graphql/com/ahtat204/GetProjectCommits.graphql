query GetProjectCommits($project: ID!,$offset:String){ ## we can use one query with a nullable (apollo almost always uses nullable types like String?)$cursor variable and just pass null for the first page
    project(fullPath: $project){
        repository {
            commits(ref:"",first: 10,after:$offset){
                nodes {
                    id
                    name
                    message
                    authorName
                    committedDate
                    signature {
                        verificationStatus
                    }
                }
                pageInfo {
                    endCursor
                    hasNextPage
                    startCursor
                }
            }
        }
    }
}