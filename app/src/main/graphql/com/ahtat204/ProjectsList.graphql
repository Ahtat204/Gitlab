query GetMyProjectsPaginated { ## this in case the user has large number of projects ,in my case , I currently don't
    currentUser {
        avatarUrl
        projectMemberships(first: 10) {
            __typename
            nodes {

                __typename
                id
                project {
                    topics
                    lastActivityAt
                    __typename
                    languages {
                        color
                        name
                    }
                    name
                    fullPath
                    description
                    visibility
                }
            }
            pageInfo {
                __typename
                hasNextPage
                endCursor
            }
        }
    }
}
query GetMyProjects($cursor: String){
    currentUser {
        avatarUrl
        projectMemberships(after: $cursor) {
            __typename
            nodes {

                __typename
                id
                project {
                    topics
                    lastActivityAt
                    __typename
                    languages {
                        color
                        name
                    }
                    name
                    fullPath
                    description
                    visibility
                }
            }
            pageInfo {
                __typename
                hasNextPage
                endCursor
            }
        }
    }
}
