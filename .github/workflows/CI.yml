name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build-test:
    name: Build Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Create secrets file
        run: |
          printf "CIENTID=20302211ABH62HY6" > $GITHUB_WORKSPACE/secrets.properties
      - name: Debug file location
        run: |
          touch secrets.properties
          echo "Current directory is:"
          pwd
          echo "Files in current directory:"
          ls -F
          echo "Check if file exists in app/ folder:"
          ls -F app/ || echo "app/ folder not found or empty"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew clean build
      - run: echo "Build status report=${{ job.status }}"
      - name: Verify file exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/secrets.properties" ]; then
            echo "File found successfully!"
          else
            echo "File not found! Searching directory..."
            ls -R $GITHUB_WORKSPACE
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace
